<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TicketLab — support event simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
:root{
  --slate:#23262b; --slate2:#2b2f36; --slate3:#343941;
  --vellum:#efe6d0; --vellum-dim:#d8cfb8;
  --brass:#b8965a; --brass-bright:#d4b06a;
  --ok:#7da87b; --warn:#c9885b; --bad:#b8615a;
  --mono:'IBM Plex Mono',monospace; --serif:'Instrument Serif',serif;
}
*{box-sizing:border-box;margin:0}
/* author rules setting display: on a class otherwise beat the UA [hidden]
   rule even though hidden is set — e.g. .composer{display:flex} always won.
   Force hidden to actually hide, regardless of what else targets the element. */
[hidden]{display:none!important}
body{background:var(--slate);color:var(--vellum);font-family:var(--mono);font-size:14px;min-height:100vh}
header{display:flex;justify-content:space-between;align-items:baseline;
  padding:18px 28px;border-bottom:1px solid var(--slate3)}
header h1{font-family:var(--serif);font-weight:400;font-size:26px;letter-spacing:.5px}
header h1 em{color:var(--brass-bright);font-style:normal}
#status{color:var(--vellum-dim);font-size:12px}
main{display:grid;grid-template-columns:1.2fr 1fr;gap:0;height:calc(100vh - 63px)}
@media(max-width:900px){main{grid-template-columns:1fr;height:auto}}
section{padding:20px 28px;overflow-y:auto}
.ticket{border-right:1px solid var(--slate3)}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);margin-bottom:10px}

/* ticket header card */
.tcard{background:var(--slate2);border:1px solid var(--slate3);border-left:3px solid var(--brass);
  padding:12px 14px;margin-bottom:14px}
.tcard .subj{font-family:var(--serif);font-size:19px;margin-bottom:4px}
.tcard .meta{font-size:11px;color:var(--vellum-dim)}

/* mission card — goals + live progress that fills in as you play */
.mission{background:var(--slate2);border:1px solid var(--slate3);padding:12px 14px;margin-bottom:14px}
.mission .mmeta{font-size:11px;color:var(--vellum-dim);margin-bottom:8px}
.goal{display:flex;gap:8px;font-size:12px;color:var(--vellum-dim);margin:5px 0;line-height:1.45}
.goal::before{content:"◇";color:var(--brass);flex:none}
.prog{display:flex;justify-content:space-between;gap:10px;font-size:12px;margin:5px 0;
  color:var(--vellum-dim);border-top:1px dashed var(--slate3);padding-top:5px}
.prog:first-of-type{border-top:1px solid var(--slate3);margin-top:9px;padding-top:9px}
.prog .mark{flex:none;width:14px;color:var(--slate3)}
.prog b{color:var(--vellum-dim);font-weight:500;white-space:nowrap}
.prog.done{color:var(--vellum)}
.prog.done .mark{color:var(--ok)}
.prog.done b{color:var(--ok)}
.prog.failed .mark,.prog.failed b{color:var(--bad)}

/* satisfaction gauge — the signature element: a brass meter needle */
.gauge{margin:14px 0 18px}
.gauge-track{height:10px;background:var(--slate3);position:relative;border:1px solid #40454e}
.gauge-fill{height:100%;background:linear-gradient(90deg,var(--bad),var(--warn) 45%,var(--ok));
  width:40%;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.gauge-needle{position:absolute;top:-5px;width:2px;height:20px;background:var(--brass-bright);
  left:40%;transition:left .6s cubic-bezier(.2,.8,.2,1)}
.gauge-label{display:flex;justify-content:space-between;font-size:11px;color:var(--vellum-dim);margin-top:4px}
.gauge-label b{color:var(--brass-bright)}

/* thread */
#thread{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.msg{max-width:88%;padding:10px 13px;line-height:1.5;white-space:pre-wrap}
.msg.customer{background:var(--vellum);color:#2c2a24;align-self:flex-start;
  border-radius:2px 10px 10px 10px}
.msg.trainee{background:var(--slate3);align-self:flex-end;border-radius:10px 2px 10px 10px;
  border:1px solid #40454e}
.msg .who{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.6;display:block;margin-bottom:4px}
.fact{align-self:flex-start;font-size:11px;color:var(--brass-bright);border:1px dashed var(--brass);
  padding:4px 9px;background:rgba(184,150,90,.08)}
.sys{align-self:center;font-size:11px;color:var(--vellum-dim);font-style:italic}

.composer{display:flex;gap:8px;position:sticky;bottom:0;background:var(--slate);padding-top:8px}
textarea{flex:1;background:var(--slate2);border:1px solid var(--slate3);color:var(--vellum);
  font-family:var(--mono);font-size:13px;padding:10px;resize:vertical;min-height:64px}
textarea:focus{outline:2px solid var(--brass);outline-offset:1px}
button{background:var(--brass);color:#211d14;border:0;font-family:var(--mono);font-weight:600;
  font-size:12px;padding:10px 16px;cursor:pointer;letter-spacing:.04em}
button:hover{background:var(--brass-bright)}
button:focus-visible{outline:2px solid var(--vellum);outline-offset:2px}
button.quiet{background:var(--slate3);color:var(--vellum)}
button.quiet:hover{background:#40454e}
button.danger{background:var(--bad);color:var(--vellum)}
button:disabled{opacity:.4;cursor:not-allowed}

/* panel pane */
.panelcard{background:var(--slate2);border:1px solid var(--slate3);padding:14px;margin-bottom:14px}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap}
.pill{padding:2px 10px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1px solid}
.pill.running{color:var(--ok);border-color:var(--ok)}
.pill.offline{color:var(--bad);border-color:var(--bad)}
.pill.suspended{color:var(--bad);border-color:var(--bad)}
.pill.active{color:var(--ok);border-color:var(--ok)}
.pill.overdue{color:var(--warn);border-color:var(--warn)}
.pill.paid{color:var(--ok);border-color:var(--ok)}
.pill.failed{color:var(--bad);border-color:var(--bad)}
.pill.pending{color:var(--warn);border-color:var(--warn)}
.subhead{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-bright);margin:12px 0 4px}
.invrow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap}
.invrow .meta{font-size:11px;color:var(--vellum-dim)}
.dim{display:flex;justify-content:space-between;gap:10px;margin:6px 0;font-size:12px}
.dim b{color:var(--brass-bright)}
.flagline{font-size:11px;color:var(--warn);margin:4px 0}
input[type=text],input[type=number]{background:var(--slate);border:1px solid var(--slate3);
  color:var(--vellum);font-family:var(--mono);font-size:12px;padding:8px;width:100%}
label{font-size:11px;color:var(--vellum-dim);display:block;margin:10px 0 4px}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
button.mini{padding:6px 11px;font-size:11px}
.attemptbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
#debrief{display:none}
.debrief-grade{font-family:var(--serif);font-size:34px;color:var(--brass-bright)}
.debrief-block{border-top:1px solid var(--slate3);padding-top:10px;margin-top:10px;line-height:1.6}
.debrief-block .k{color:var(--vellum-dim)}
.tape{background:var(--vellum);color:#2c2a24;padding:12px 14px;margin-top:10px;line-height:1.55;
  box-shadow:0 2px 0 rgba(0,0,0,.35);position:relative}
.tape::before{content:"";position:absolute;top:-6px;left:14px;right:14px;height:6px;
  background:repeating-linear-gradient(90deg,transparent 0 6px,var(--vellum) 6px 12px)}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <h1>Ticket<em>Lab</em> <span style="font-size:13px;color:var(--vellum-dim)">· support event simulator · demo mode</span></h1>
  <div style="display:flex;gap:16px;align-items:baseline"><a href="/trainer" style="color:var(--vellum-dim);font-size:12px;text-decoration:none">trainer console →</a><div id="status">no attempt</div></div>
</header>
<main>
  <section class="ticket">
    <div class="eyebrow">Ticket</div>
    <div class="tcard" id="picker"><div class="subj">Pick a scenario to begin</div>
      <div class="meta" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="scenSel" style="background:var(--slate2);color:var(--vellum);border:1px solid var(--slate3);font-family:var(--mono);font-size:12px;padding:8px"></select>
        <button id="startBtn">Start attempt</button></div></div>
    <div class="tcard" id="activeCard" hidden>
      <div class="subj" id="activeSubj"></div>
      <div class="meta" id="activeMeta"></div>
    </div>
    <div class="attemptbar" id="attemptbar" hidden>
      <button class="quiet mini" id="newScenBtn">↩ New scenario</button>
      <button class="quiet mini" id="restartBtn">⟳ Restart this scenario</button>
      <button class="danger mini" id="giveupBtn">✕ Give up / end attempt</button>
    </div>
    <div class="mission" id="mission" hidden>
      <div class="eyebrow">Mission</div>
      <div class="mmeta" id="mmeta"></div>
      <div id="goals"></div>
      <div id="progress"></div>
    </div>
    <div class="gauge" id="gauge" hidden>
      <div class="gauge-track"><div class="gauge-fill" id="gfill"></div><div class="gauge-needle" id="gneedle"></div></div>
      <div class="gauge-label"><span>customer satisfaction</span><b id="gval">–</b></div>
    </div>
    <div id="thread"></div>
    <div class="composer" id="composer" hidden>
      <textarea id="reply" placeholder="Write your support reply… (asking the right diagnostic question can reveal what the customer isn't volunteering)"></textarea>
      <button id="sendBtn">Send reply</button>
    </div>
  </section>
  <section>
    <div class="eyebrow">Panel · billing (mock)</div>
    <div class="panelcard" id="billingPanel" hidden>
      <div class="row"><span>Account</span><span class="pill" id="acctStatus">active</span></div>
      <div class="flagline" id="suspReason" style="display:none"></div>
      <div class="subhead">Invoices</div>
      <div id="invoiceList" style="font-size:12px;color:var(--vellum-dim)"></div>
      <div class="subhead">Payment method on file</div>
      <div class="dim"><span>Card</span><b id="cardInfo">—</b></div>
      <label>Update card</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <input id="cardLast4" placeholder="last4" maxlength="4" style="width:70px">
        <input id="cardMonth" type="number" placeholder="MM" min="1" max="12" style="width:64px">
        <input id="cardYear" type="number" placeholder="YYYY" min="2024" max="2100" style="width:84px">
        <button class="quiet" id="updateCardBtn">Update card</button>
      </div>
    </div>
    <div class="eyebrow">Panel · training server (mock)</div>
    <div class="panelcard" id="panel" hidden>
      <div class="row"><span>priya-modded</span><span class="pill offline" id="power">offline</span></div>
      <label for="startup">Startup command</label>
      <input type="text" id="startup">
      <label for="mem">Memory limit (MiB)</label>
      <input type="number" id="mem" min="0">
      <div id="vars"></div>
      <div class="btnrow">
        <button class="quiet" id="applyBtn">Apply changes</button>
        <button class="quiet" id="powerStart">Start</button>
        <button class="quiet" id="powerRestart">Restart</button>
        <button class="danger" id="reinstallBtn">Reinstall server</button>
      </div>
      <div class="btnrow">
        <button class="quiet" id="waitBtn">Let 3 min pass</button>
        <button id="verifyBtn">Check my work</button>
        <span id="budget" style="font-size:11px;color:var(--vellum-dim);align-self:center"></span>
      </div>
    </div>
    <div class="panelcard" id="debrief">
      <div class="eyebrow">Debrief</div>
      <div class="debrief-grade" id="dgrade"></div>
      <div class="debrief-block" id="dtech"></div>
      <div class="debrief-block" id="dconv"></div>
      <div class="tape" id="dtape"></div>
      <div class="debrief-block" id="dgrades"></div>
      <div class="btnrow"><button id="confirmBtn" style="display:none">Confirm grades (trainer)</button></div>
    </div>
  </section>
</main>
<script>
const $=id=>document.getElementById(id);
let AID=null, BUDGET=0, USED=0, PROG=null, SCEN_ID=null;
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const LS_KEY='ticketlab_attempt_id';

function bubble(role,who,text){const m=document.createElement('div');
  m.className='msg '+role;m.innerHTML=`<span class="who">${esc(who)}</span>${esc(text)}`;
  $('thread').appendChild(m);m.scrollIntoView({block:'end'});}
function chip(text,cls){const c=document.createElement('div');c.className=cls;
  c.textContent=text;$('thread').appendChild(c);c.scrollIntoView({block:'end'});}
function setGauge(v){$('gfill').style.width=v+'%';$('gneedle').style.left=v+'%';$('gval').textContent=v+' / 100';}

function renderProgress(){
  if(!PROG)return;
  const row=(state,label,value)=>{const cls=state===true?'prog done':state==='failed'?'prog failed':'prog';
    const mark=state===true?'✓':state==='failed'?'✗':'○';
    return `<div class="${cls}"><span class="mark">${mark}</span><span style="flex:1">${esc(label)}</span><b>${esc(value)}</b></div>`;};
  const p=PROG;
  const factsDone=p.factsTotal>0&&p.found.size>=p.factsTotal;
  const satState=p.escalated?'failed':(p.sat>=p.satStart?true:null);
  const verState=p.resolved?true:(p.left<=0?'failed':null);
  $('progress').innerHTML=
    row(factsDone,'hidden context uncovered',`${p.found.size}/${p.factsTotal}`)+
    row(p.running,'server running & holding',p.running?'running':'offline')+
    row(satState,'customer on side',`${p.sat}/100${p.escalated?' · escalated':''}`)+
    row(verState,'verified resolved',p.resolved?p.grade:`${p.left} verif${p.left===1?'y':'ies'} left`);
}

async function api(path,body,method='POST'){
  const r=await fetch(path,{method,headers:{'Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined});
  if(r.status===429){chip('Verify budget exhausted — head to the debrief.','sys');return null;}
  if(!r.ok){chip('Something went wrong: '+r.status,'sys');return null;}
  return r.json();
}

async function refreshPanel(){
  const p=await fetch(`/attempts/${AID}/demo/panel`).then(r=>r.json());
  $('power').textContent=p.power_state;
  $('power').className='pill '+(p.power_state==='running'?'running':
    p.power_state==='suspended'?'suspended':'offline');
  if(PROG){PROG.running=p.power_state==='running';renderProgress();}
  if(document.activeElement!==$('startup'))$('startup').value=p.startup_command;
  if(document.activeElement!==$('mem'))$('mem').value=p.limits.memory??'';
  const holder=$('vars');
  for(const [k,v] of Object.entries(p.variables||{})){
    let inp=document.getElementById('var-'+k);
    if(!inp){
      const lab=document.createElement('label');lab.textContent='Variable · '+k;
      inp=document.createElement('input');inp.type='text';inp.id='var-'+k;inp.dataset.key=k;
      holder.appendChild(lab);holder.appendChild(inp);
    }
    if(document.activeElement!==inp)inp.value=v;
  }
}

async function refreshBilling(){
  const b=await fetch(`/attempts/${AID}/demo/billing_panel`).then(r=>r.json());
  $('acctStatus').textContent=b.account_status;
  $('acctStatus').className='pill '+b.account_status;
  if(b.suspension_reason){$('suspReason').style.display='block';$('suspReason').textContent='⚑ '+b.suspension_reason;}
  else{$('suspReason').style.display='none';}
  $('invoiceList').innerHTML=b.invoices.length?b.invoices.map(inv=>`
    <div class="invrow">
      <span>${esc(inv.id)} — $${(inv.amount/100).toFixed(2)} <span class="pill ${esc(inv.status)}">${esc(inv.status)}</span></span>
      <span class="meta">${esc(inv.due_date||'')} ${esc(inv.note||'')}</span>
      ${inv.status!=='paid'?`<button class="quiet mini" data-retry="${esc(inv.id)}">Retry payment</button>`:''}
    </div>`).join('') : '<span style="font-size:12px;color:#8f8a79">no invoices on file</span>';
  $('cardInfo').textContent=b.payment_method.last4
    ?`•••• ${esc(b.payment_method.last4)} exp ${b.payment_method.exp_month}/${b.payment_method.exp_year} — ${esc(b.payment_method.status)}`
    :'no card on file';
  $('invoiceList').querySelectorAll('[data-retry]').forEach(btn=>btn.onclick=async()=>{
    await api(`/attempts/${AID}/demo/billing/retry_payment`,{invoice_id:btn.dataset.retry});
    refreshBilling();refreshPanel();
  });
}
$('updateCardBtn').onclick=async()=>{
  const last4=$('cardLast4').value.trim(),month=parseInt($('cardMonth').value||'0',10),
    year=parseInt($('cardYear').value||'0',10);
  if(!/^\d{4}$/.test(last4)||!month||!year)return;
  await api(`/attempts/${AID}/demo/billing/update_card`,{last4,exp_month:month,exp_year:year});
  $('cardLast4').value='';$('cardMonth').value='';$('cardYear').value='';
  refreshBilling();refreshPanel();
};

async function loadScenarios(){
  const list=await fetch('/scenarios').then(r=>r.json());
  $('scenSel').innerHTML=list.map(s=>`<option value="${esc(s.id)}">${esc(s.title)} (lvl ${s.difficulty})</option>`).join('');
}

function showPicker(){
  AID=null;PROG=null;SCEN_ID=null;localStorage.removeItem(LS_KEY);
  $('picker').hidden=false;$('activeCard').hidden=true;$('attemptbar').hidden=true;
  $('mission').hidden=true;$('gauge').hidden=true;$('composer').hidden=true;
  $('panel').hidden=true;$('billingPanel').hidden=true;
  $('debrief').style.display='none';$('thread').innerHTML='';
  $('status').textContent='no attempt';
}

function showActive(ticket,scenarioBrief,verifyBudget){
  SCEN_ID=scenarioBrief.id;BUDGET=verifyBudget;
  $('picker').hidden=true;$('activeCard').hidden=false;$('attemptbar').hidden=false;
  $('activeSubj').textContent=ticket.subject;
  $('activeMeta').textContent=`from ${ticket.customer_name} · priority ${ticket.priority}`;
  $('status').textContent='attempt '+AID;
  $('mission').hidden=false;
  $('mmeta').textContent=`${scenarioBrief.title} · lvl ${scenarioBrief.difficulty} · ~${scenarioBrief.estimated_minutes} min`;
  $('goals').innerHTML=scenarioBrief.objectives.map(o=>`<div class="goal">${esc(o)}</div>`).join('');
  $('gauge').hidden=false;$('composer').hidden=false;$('panel').hidden=false;
  $('billingPanel').hidden=false;
  $('debrief').style.display='none';
  $('budget').textContent=`verify: ${verifyBudget} left`;
}

async function beginAttempt(scenarioId){
  const a=await api('/attempts',{scenario_id:scenarioId});
  if(!a)return;
  AID=a.attempt_id;USED=0;
  localStorage.setItem(LS_KEY,AID);
  $('thread').innerHTML='';
  showActive(a.ticket,a.scenario,a.verify_budget);
  PROG={factsTotal:a.scenario.facts_total,found:new Set(),running:false,resolved:false,
        grade:null,sat:a.satisfaction,satStart:a.satisfaction,escalated:false,left:a.verify_budget};
  setGauge(a.satisfaction);renderProgress();
  bubble('customer',a.ticket.customer_name,a.ticket.body.trim());
  refreshPanel();refreshBilling();
}

async function resumeAttempt(aid){
  const r=await fetch(`/attempts/${aid}/state`);
  if(!r.ok){localStorage.removeItem(LS_KEY);return false;}
  const st=await r.json();
  AID=st.attempt_id;USED=st.verify_attempts_used;
  $('thread').innerHTML='';
  showActive(st.ticket,st.scenario,st.verify_budget-st.verify_attempts_used);
  PROG={factsTotal:st.scenario.facts_total,found:new Set(st.facts_revealed),
        running:false,resolved:false,grade:null,sat:st.satisfaction,
        satStart:st.satisfaction_start,escalated:st.escalated,
        left:st.verify_budget-st.verify_attempts_used};
  setGauge(st.satisfaction);renderProgress();
  bubble('customer',st.ticket.customer_name,st.ticket.body.trim());
  for(const m of st.thread)bubble(m.role,m.role==='trainee'?'you':'customer',m.text);
  if(st.escalated)chip('Satisfaction hit zero — the customer escalated. Conversation over.','sys');
  refreshPanel();refreshBilling();
  return true;
}

$('startBtn').onclick=()=>beginAttempt($('scenSel').value);
$('newScenBtn').onclick=async()=>{
  if(AID)await fetch(`/attempts/${AID}/debrief`);   // finalize so it isn't stuck 'in progress'
  showPicker();
};
$('restartBtn').onclick=async()=>{
  const sid=SCEN_ID;if(!sid)return;
  if(AID)await fetch(`/attempts/${AID}/debrief`);
  beginAttempt(sid);
};
$('giveupBtn').onclick=()=>{
  chip('Attempt ended — see the debrief below.','sys');showDebrief();
};

(async()=>{
  await loadScenarios();
  const saved=localStorage.getItem(LS_KEY);
  if(saved&&await resumeAttempt(saved))return;
  showPicker();
})();

$('sendBtn').onclick=async()=>{
  const t=$('reply').value.trim();if(!t||!AID)return;
  bubble('trainee','you',t);$('reply').value='';
  const r=await api(`/attempts/${AID}/message`,{text:t});if(!r)return;
  r.facts_revealed.forEach(f=>{chip('fact uncovered: '+f,'fact');PROG&&PROG.found.add(f);});
  bubble('customer','customer',r.reply);setGauge(r.satisfaction);
  if(PROG){PROG.sat=r.satisfaction;PROG.escalated=r.escalated;renderProgress();}
  if(r.escalated)chip('Satisfaction hit zero — the customer escalated. Conversation over.','sys');
};

$('applyBtn').onclick=async()=>{
  await api(`/attempts/${AID}/demo/mutate`,{action:'set_startup_command',value:$('startup').value});
  await api(`/attempts/${AID}/demo/mutate`,{action:'set_limits',memory:parseInt($('mem').value||'0',10)});
  for(const inp of $('vars').querySelectorAll('input')){
    await api(`/attempts/${AID}/demo/mutate`,{action:'set_variable',key:inp.dataset.key,value:inp.value});
  }
  refreshPanel();
};
$('powerStart').onclick=async()=>{await api(`/attempts/${AID}/demo/mutate`,{action:'start'});refreshPanel();};
$('powerRestart').onclick=async()=>{await api(`/attempts/${AID}/demo/mutate`,{action:'restart'});refreshPanel();};
$('reinstallBtn').onclick=async()=>{await api(`/attempts/${AID}/demo/mutate`,{action:'reinstall'});refreshPanel();};
$('waitBtn').onclick=async()=>{await api(`/attempts/${AID}/demo/advance_clock`,{seconds:181});
  chip('Three minutes pass…','sys');refreshPanel();};

$('verifyBtn').onclick=async()=>{
  const r=await api(`/attempts/${AID}/verify`);if(!r)return showDebrief();
  USED++;$('budget').textContent=`verify: ${r.attempts_remaining} left`;
  if(PROG){PROG.left=r.attempts_remaining;
    if(r.complete){PROG.resolved=true;PROG.grade=`${r.grade} · ${r.score} pts`;}
    renderProgress();}
  if(!r.complete){chip('Not resolved yet — the fault (or its instability) persists.','sys');
    if(r.attempts_remaining<=0)showDebrief();return;}
  chip(`Resolved — grade: ${r.grade} (${r.score} pts)`,'sys');showDebrief();
};

async function showDebrief(){
  const d=await fetch(`/attempts/${AID}/debrief`).then(r=>r.json());
  $('debrief').style.display='block';
  const t=d.technical,c=d.conversation;
  $('dgrade').textContent=t.complete?`${t.grade} · ${t.score} pts`:'unresolved · 0 pts';
  $('dtech').innerHTML=`<span class="k">technical —</span> ${t.complete?esc(t.solution):'no solution verified'}`+
    (t.anti_patterns.length?`<br><span class="k">anti-patterns:</span> ${esc(t.anti_patterns.join(', '))}`:'');
  $('dconv').innerHTML=`<span class="k">conversation —</span> satisfaction ${c.satisfaction_final}/100`+
    `${c.escalated?' (escalated)':''} · facts uncovered ${c.facts_uncovered}/${c.facts_total}`+
    (c.facts_missed.length?`<br><span class="k">missed:</span> ${esc(c.facts_missed.join(', '))}`:'');
  $('dtape').textContent=(t.feedback||'')+' '+(t.anti_pattern_feedback||[]).join(' ');
  const g=await fetch(`/attempts/${AID}/grades`).then(r=>r.json());
  renderGrades(g);
}

function renderGrades(g){
  const dims=g.grades.dimensions.map(d=>
    `<div class="dim"><span>${esc(d.name)}${d.overridden?' *':''} — ${esc(d.rationale)}</span><b>${d.score}/10</b></div>`).join('');
  const flags=(g.grades.flags||[]).map(f=>
    `<div class="flagline">⚑ ${esc(f.detail||f.id)}</div>`).join('');
  $('dgrades').innerHTML=`<span class="k">reply quality — ${esc(g.status)} by ${esc(g.grader)}${g.confirmed_by?(' · confirmed by '+esc(g.confirmed_by)):''}</span>${dims}${flags}`;
  $('confirmBtn').style.display=g.status==='proposed'?'inline-block':'none';
}

$('confirmBtn').onclick=async()=>{
  const who=prompt('Trainer name for the confirmation record:');
  if(!who)return;
  const g=await api(`/attempts/${AID}/grades/confirm`,{confirmed_by:who});
  if(g)renderGrades(g);
};
</script>
</body>
</html>
